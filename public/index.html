
<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fang Stjernen ⭐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            box-shadow: 0 0 40px rgba(100, 100, 255, 0.3);
            border-radius: 16px;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a3a 0%, #0a0a1a 100%);
            touch-action: none;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            backdrop-filter: blur(4px);
            z-index: 10;
            padding: 20px;
        }

        .overlay h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px gold;
            animation: glow 2s ease-in-out infinite alternate;
        }

        .overlay h2 {
            font-size: 2.2rem;
            margin-bottom: 15px;
            color: #ffcc00;
        }

        .overlay p {
            font-size: 1.2rem;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .overlay button {
            font-size: 1.4rem;
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            background: gold;
            color: #0a0a1a;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .overlay button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(255, 215, 0, 0.8);
        }

        .overlay button:active {
            transform: scale(0.95);
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px gold, 0 0 20px gold;
            }
            to {
                text-shadow: 0 0 20px gold, 0 0 40px orange;
            }
        }

        #score-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 5;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 0 0 10px black;
            opacity: 0.9;
            padding: 0 5px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="500" height="500"></canvas>
        <div id="score-panel">
            <span>⭐ <span id="scoreDisplay">0</span></span>
            <span>⏱️ <span id="timerDisplay">30</span>s</span>
        </div>
        <div id="overlay-start" class="overlay">
            <h1>Fang Stjernen ⭐</h1>
            <p>Klik på stjernen for at score point.<br>Du har <strong>30 sekunder</strong>!</p>
            <button id="startBtn">Start spil</button>
        </div>
        <div id="overlay-end" class="overlay hidden">
            <h2>Game Over</h2>
            <p>Din score: <span id="finalScore">0</span></p>
            <p>🏆 Highscore: <span id="highScoreDisplay">0</span></p>
            <button id="restartBtn">Spil igen</button>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const overlayStart = document.getElementById('overlay-start');
            const overlayEnd = document.getElementById('overlay-end');
            const startBtn = document.getElementById('startBtn');
            const restartBtn = document.getElementById('restartBtn');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const timerDisplay = document.getElementById('timerDisplay');
            const finalScoreSpan = document.getElementById('finalScore');
            const highScoreDisplay = document.getElementById('highScoreDisplay');
            const scorePanel = document.getElementById('score-panel');

            let audioCtx = null;
            function initAudio() {
                if (!audioCtx) {
                    try {
                        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    } catch (e) {
                        audioCtx = null;
                    }
                }
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }

            function playCatchSound() {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.2);
            }

            function playGameOverSound() {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.5);
            }

            const GAME_DURATION = 30;
            const STAR_BASE_SPEED = 150;
            const STAR_INITIAL_RADIUS = 35;
            const STAR_MIN_RADIUS = 15;
            const STAR_RADIUS_DECREASE = 1.2;

            let gameState = 'start';
            let score = 0;
            let timeLeft = GAME_DURATION;
            let lastTimestamp = 0;
            let highScore = 0;
            let speedMultiplier = 1;
            let star = null;
            let particles = [];
            let backgroundStars = [];
            let starInvincibleUntil = 0;

            function createStar() {
                const radius = Math.max(STAR_MIN_RADIUS, STAR_INITIAL_RADIUS - (score * STAR_RADIUS_DECREASE));
                const angle = Math.random() * Math.PI * 2;
                const speed = STAR_BASE_SPEED * speedMultiplier;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                const margin = radius + 5;
                const x = margin + Math.random() * (canvas.width - 2 * margin);
                const y = margin + Math.random() * (canvas.height - 2 * margin);
                return {
                    x,
                    y,
                    vx,
                    vy,
                    radius,
                    innerRadius: radius * 0.45,
                    rotation: Math.random() * Math.PI * 2,
                    rotationSpeed: (Math.random() - 0.5) * 4,
                };
            }

            function resetGame() {
                score = 0;
                timeLeft = GAME_DURATION;
                speedMultiplier = 1;
                starInvincibleUntil = 0;
                particles = [];
                star = createStar();
                updateUI();
            }

            function updateUI() {
                scoreDisplay.textContent = score;
                timerDisplay.textContent = Math.ceil(timeLeft);
            }

            function loadHighScore() {
                const saved = localStorage.getItem('fangStjernenHighscore');
                highScore = saved ? parseInt(saved, 10) : 0;
                highScoreDisplay.textContent = highScore;
            }

            function saveHighScore() {
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('fangStjernenHighscore', highScore);
                    highScoreDisplay.textContent = highScore;
                }
            }

            function initBackgroundStars() {
                backgroundStars = [];
                for (let i = 0; i < 80; i++) {
                    backgroundStars.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        radius: Math.random() * 2 + 0.5,
                        baseAlpha: Math.random() * 0.5 + 0.3,
                        twinkleSpeed: Math.random() * 3 + 1,
                        twinkleOffset: Math.random() * Math.PI * 2,
                    });
                }
            }

            function drawStarShape(ctx, cx, cy, outerR, innerR, rotation) {
                ctx.beginPath();
                const spikes = 5;
                const step = Math.PI / spikes;
                let angle = rotation - Math.PI / 2;
                for (let i = 0; i < spikes * 2; i++) {
                    const r = i % 2 === 0 ? outerR : innerR;
                    const x = cx + Math.cos(angle) * r;
                    const y = cy + Math.sin(angle) * r;
                    ctx.lineTo(x, y);
                    angle += step;
                }
                ctx.closePath();
            }

            function drawBackground(timestamp) {
                for (const s of backgroundStars) {
                    const alpha = s.baseAlpha + Math.sin(timestamp * 0.001 * s.twinkleSpeed + s.twinkleOffset) * 0.2;
                    ctx.globalAlpha = Math.max(0.1, Math.min(1, alpha));
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }

            function drawStar(star, timestamp) {
                const { x, y, radius, innerRadius, rotation } = star;
                ctx.save();
                ctx.translate(x, y);
                ctx.shadowColor = '#ffdd44';
                ctx.shadowBlur = 20;
                const gradient = ctx.createRadialGradient(0, 0, innerRadius * 0.5, 0, 0, radius);
                gradient.addColorStop(0, '#fff8c0');
                gradient.addColorStop(0.5, '#ffcc00');
                gradient.addColorStop(1, '#e6a800');
                ctx.fillStyle = gradient;
                drawStarShape(ctx, 0, 0, radius, innerRadius, rotation);
                ctx.fill();
                ctx.shadowBlur = 10;
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.restore();
            }

            function drawParticles() {
                for (const p of particles) {
                    ctx.globalAlpha = p.life / p.maxLife;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }

            function spawnParticles(x, y, count = 15) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 100 + Math.random() * 300;
                    const life = 0.3 + Math.random() * 0.5;
                    particles.push({
                        x,
                        y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        radius: 2 + Math.random() * 4,
                        life,
                        maxLife: life,
                        color: `hsl(${40 + Math.random() * 30}, 100%, ${60 + Math.random() * 30}%)`,
                    });
                }
            }

            function update(deltaTime) {
                if (gameState !== 'playing') return;
                timeLeft -= deltaTime;
                if (timeLeft <= 0) {
                    timeLeft = 0;
                    endGame();
                    return;
                }

                if (star && performance.now() > starInvincibleUntil) {
                    star.x += star.vx * deltaTime;
                    star.y += star.vy * deltaTime;
                    star.rotation += star.rotationSpeed * deltaTime;
                    const r = star.radius;
                    if (star.x - r < 0) {
                        star.x = r;
                        star.vx = Math.abs(star.vx);
                    } else if (star.x + r > canvas.width) {
                        star.x = canvas.width - r;
                        star.vx = -Math.abs(star.vx);
                    }
                    if (star.y - r < 0) {
                        star.y = r;
                        star.vy = Math.abs(star.vy);
                    } else if (star.y + r > canvas.height) {
                        star.y = canvas.height - r;
                        star.vy = -Math.abs(star.vy);
                    }
                }

                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx * deltaTime;
                    p.y += p.vy * deltaTime;
                    p.life -= deltaTime;
                    if (p.life <= 0) {
                        particles.splice(i, 1);
                    }
                }

                updateUI();
            }

            function catchStar(clickX, clickY) {
                if (gameState !== 'playing' || !star) return;
                if (performance.now() < starInvincibleUntil) return;
                const dx = clickX - star.x;
                const dy = clickY - star.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist <= star.radius) {
                    score++;
                    speedMultiplier = Math.min(3, 1 + score * 0.06);
                    spawnParticles(star.x, star.y, 12 + Math.floor(score / 5));
                    playCatchSound();
                    star = createStar();
                    starInvincibleUntil = performance.now() + 250;
                    updateUI();
                }
            }

            function endGame() {
                gameState = 'end';
                playGameOverSound();
                finalScoreSpan.textContent = score;
                saveHighScore();
                overlayEnd.classList.remove('hidden');
                scorePanel.style.display = 'none';
            }

            function gameLoop(timestamp) {
                if (!lastTimestamp) lastTimestamp = timestamp;
                let deltaTime = (timestamp - lastTimestamp) / 1000;
                if (deltaTime > 0.1) deltaTime = 0.1;
                lastTimestamp = timestamp;

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                drawBackground(timestamp);

                if (gameState === 'playing') {
                    update(deltaTime);
                    if (star) drawStar(star, timestamp);
                    drawParticles();
                } else if (gameState === 'start') {
                    const decoStar = {
                        x: canvas.width / 2,
                        y: canvas.height / 2,
                        radius: 40,
                        innerRadius: 18,
                        rotation: timestamp * 0.001,
                    };
                    drawStar(decoStar, timestamp);
                }

                requestAnimationFrame(gameLoop);
            }

            function getCanvasCoords(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return {
                    x: (clientX - rect.left) * scaleX,
                    y: (clientY - rect.top) * scaleY,
                };
            }

            function onPointerDown(e) {
                e.preventDefault();
                initAudio();
                if (gameState !== 'playing') return;
                const coords = getCanvasCoords(e);
                catchStar(coords.x, coords.y);
            }

            function startGame() {
                initAudio();
                resetGame();
                gameState = 'playing';
                overlayStart.classList.add('hidden');
                overlayEnd.classList.add('hidden');
                scorePanel.style.display = 'flex';
                lastTimestamp = 0;
                updateUI();
            }

            function restartGame() {
                initAudio();
                resetGame();
                gameState = 'playing';
                overlayEnd.classList.add('hidden');
                scorePanel.style.display = 'flex';
                lastTimestamp = 0;
                updateUI();
            }

            function init() {
                loadHighScore();
                initBackgroundStars();
                overlayStart.classList.remove('hidden');
                overlayEnd.classList.add('hidden');
                scorePanel.style.display = 'none';
                star = createStar();
                gameState = 'start';

                canvas.addEventListener('pointerdown', onPointerDown);
                startBtn.addEventListener('click', startGame);
                restartBtn.addEventListener('click', restartGame);
                canvas.addEventListener('contextmenu', (e) => e.preventDefault());
                requestAnimationFrame(gameLoop);
            }

            init();
        })();
    </script>
</body>
</html>
